name: PR Checks

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'

      - run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

  test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'

      - run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Show coverage summary
        run: |
          sudo apt-get install -y lcov
          lcov --list coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage/lcov.info
          fail_ci_if_error: false

  build_check:
    name: Build Check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'

      - run: flutter pub get

      - name: Build APK
        run: >
          flutter build apk --release
          --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Verify APK exists
        run: ls -la build/app/outputs/flutter-apk/app-release.apk

  firebase_emulator_tests:
    name: Firebase Emulator Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: flutter pub get

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run tests with Firestore emulator
        run: |
          firebase emulators:exec --project demo-pocketplus --only firestore \
            "flutter test" \
            --config firebase/firebase.json
