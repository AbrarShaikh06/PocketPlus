name: PR Checks

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'

      - run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

  test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'

      - run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Show coverage summary
        run: |
          sudo apt-get install -y lcov
          lcov --list coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage/lcov.info
          fail_ci_if_error: false

  build_check:
    name: Build Check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'

      # google-services.json is gitignored; the Android google-services Gradle
      # plugin fails the build without it. Reconstruct it from a repo secret.
      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - run: flutter pub get

      - name: Build APK
        run: >
          flutter build apk --release
          --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Verify APK exists
        run: ls -la build/app/outputs/flutter-apk/app-release.apk

  firestore_rules_tests:
    name: Firestore Rules Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # firebase-tools 13 (pinned in firebase/package.json) runs on Java 17.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install rules-test dependencies
        working-directory: firebase
        run: npm install

      - name: Run Firestore security rules tests
        working-directory: firebase
        run: npm run test:emulator
