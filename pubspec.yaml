name: pocket_plus
description: PocketPlus — expense tracking for small Indian businesses.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  firebase_auth: ^6.5.2
  firebase_storage: ^13.4.2
  firebase_messaging: ^16.3.0
  firebase_analytics: ^12.4.2
  firebase_crashlytics: ^5.2.3
  firebase_remote_config: ^6.2.3

  # State management & navigation
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  go_router: ^17.3.0

  # Monetisation (banner ads only — paywalls/IAP removed)
  google_mobile_ads: ^9.0.0

  # Charts & PDF
  fl_chart: ^1.2.0
  pdf: ^3.11.1
  printing: ^5.13.2

  # Device & permissions
  image_picker: ^1.1.2
  speech_to_text: ^7.4.0

  permission_handler: ^12.0.3
  #telephony: ^0.2.0
  connectivity_plus: ^7.1.1
  flutter_image_compress: ^2.3.0

  # Biometric / PIN app lock
  local_auth: ^2.3.0

  # Sharing & links
  share_plus: ^13.1.0
  url_launcher: ^6.3.0

  # Design system
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.4
  crypto: ^3.0.5
  uuid: ^4.5.1
  dartz: ^0.10.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutter_secure_storage: ^10.3.1
  tutorial_coach_mark: ^1.2.11
  flutter_local_notifications: ^22.0.0
  workmanager: ^0.9.0
  package_info_plus: ^10.1.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.4
  path_provider_platform_interface: ^2.1.2

flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: Noto Sans
      fonts:
        - asset: assets/fonts/NotoSans-Variable.ttf
          weight: 400
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
          weight: 400
