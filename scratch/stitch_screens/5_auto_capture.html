<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Auto-Capture Confirmation - HisaabPro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-primary": "#abc7ff",
                      "on-secondary-fixed": "#001a40",
                      "on-secondary-fixed-variant": "#004590",
                      "on-error": "#ffffff",
                      "inverse-on-surface": "#f1f1f1",
                      "on-tertiary-container": "#e2ffe4",
                      "secondary-fixed": "#d7e2ff",
                      "error-container": "#ffdad6",
                      "on-secondary-container": "#003c7f",
                      "inverse-surface": "#2f3131",
                      "on-background": "#0D3A35",
                      "on-surface": "#0D3A35",
                      "primary": "#0D3A35",
                      "tertiary-container": "#276152",
                      "surface-container-high": "#B1B7AB",
                      "tertiary-fixed": "#7efba4",
                      "primary-fixed": "#d7e2ff",
                      "surface-variant": "#B1B7AB",
                      "on-surface-variant": "#276152",
                      "surface-container-lowest": "#ffffff",
                      "error": "#ba1a1a",
                      "on-tertiary": "#ffffff",
                      "outline-variant": "#B1B7AB",
                      "surface-container-highest": "#e2e2e2",
                      "secondary-fixed-dim": "#acc7ff",
                      "on-tertiary-fixed-variant": "#005228",
                      "tertiary-fixed-dim": "#61de8a",
                      "on-primary-container": "#FBF6F0",
                      "primary-fixed-dim": "#abc7ff",
                      "secondary-container": "#276152",
                      "surface-bright": "#FBF6F0",
                      "outline": "#276152",
                      "surface-container": "#eeeeee",
                      "surface-container-low": "#FBF6F0",
                      "background": "#FBF6F0",
                      "surface-tint": "#0D3A35",
                      "surface": "#FBF6F0",
                      "on-primary": "#ffffff",
                      "surface-dim": "#B1B7AB",
                      "on-tertiary-fixed": "#00210c",
                      "secondary": "#276152",
                      "tertiary": "#006733",
                      "on-primary-fixed-variant": "#00458f",
                      "primary-container": "#0D3A35",
                      "on-primary-fixed": "#001b3f",
                      "on-secondary": "#ffffff",
                      "on-error-container": "#93000a"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-gap-lg": "24px",
                      "stack-gap-sm": "8px",
                      "card-padding": "16px",
                      "touch-target-min": "48px",
                      "stack-gap-md": "16px",
                      "container-margin": "16px"
              },
              "fontFamily": {
                      "headline-lg": ["Noto Sans"],
                      "label-sm": ["Noto Sans"],
                      "hero-amount": ["Noto Sans"],
                      "body-lg": ["Noto Sans"],
                      "headline-md": ["Noto Sans"],
                      "body-md": ["Noto Sans"],
                      "label-bold": ["Noto Sans"]
              },
              "fontSize": {
                      "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                      "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                      "hero-amount": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                      "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                      "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                      "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                      "label-bold": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }]
              }
            }
          }
        }
    </script>
<style>
        body {
            font-family: 'Noto Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-[#FBF6F0] min-h-screen flex items-center justify-center p-container-margin antialiased">
<main class="w-full max-w-[390px] mx-auto">
<!-- Header / Close Action -->
<header class="flex justify-between items-center mb-stack-gap-lg px-2">
<button aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-variant text-on-surface-variant active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="text-[#0D3A35] font-label-bold text-label-bold uppercase tracking-widest text-opacity-60">Auto-Capture</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Card Container -->
<section class="bg-white rounded-[24px] shadow-[0_8px_24px_rgba(13,58,53,0.08)] p-card-padding flex flex-col gap-stack-gap-lg overflow-hidden relative">
<!-- Subtle top accent -->
<div class="absolute top-0 left-0 right-0 h-1 bg-[#0D3A35]"></div>
<!-- Context Banner -->
<div class="flex items-start gap-3 bg-[#FBF6F0] p-3 rounded-xl border border-[#B1B7AB]">
<div class="w-10 h-10 rounded-full bg-[#0D3A35] text-white flex items-center justify-center shrink-0">
<span class="material-symbols-outlined" data-icon="sms" style="font-variation-settings: 'FILL' 1;">sms</span>
</div>
<div>
<h2 class="text-[#0D3A35] font-body-md text-body-md">₹450 detected from SMS — HDFC Bank UPI debit</h2>
<p class="text-[#276152] font-label-sm text-label-sm mt-0.5">Today, 2:14 PM</p>
</div>
</div>
<!-- Extracted Details -->
<div class="flex flex-col gap-stack-gap-md px-1">
<!-- Amount -->
<div class="flex flex-col items-center justify-center py-2">
<span class="text-[#276152] font-label-bold text-label-bold mb-1">AMOUNT</span>
<div class="flex items-baseline gap-1">
<span class="text-[#0D3A35] font-headline-md text-headline-md">₹</span>
<span class="text-error font-hero-amount text-hero-amount">450</span>
</div>
</div>
<!-- Merchant Input -->
<div class="relative">
<label class="block text-[#276152] font-label-bold text-label-bold mb-1 ml-1">PAID TO</label>
<div class="flex items-center bg-[#FBF6F0] rounded-xl px-4 py-3 border border-[#B1B7AB] focus-within:border-[#0D3A35] focus-within:ring-1 focus-within:ring-[#0D3A35] transition-all">
<span class="material-symbols-outlined text-[#276152] mr-2" data-icon="storefront">storefront</span>
<input class="bg-transparent border-none p-0 w-full text-[#0D3A35] font-body-lg text-body-lg focus:ring-0 placeholder:text-[#B1B7AB]" placeholder="Enter merchant name" type="text" value="Aman General Store"/>
</div>
</div>
</div>
<!-- Categorization -->
<div class="px-1">
<label class="block text-[#276152] font-label-bold text-label-bold mb-3 ml-1">SELECT CATEGORY</label>
<div class="flex flex-wrap gap-2">
<!-- Selected Chip -->
<button class="flex items-center gap-1.5 px-4 py-2 rounded-full bg-[#0D3A35] text-white border border-[#0D3A35] font-label-bold text-label-bold transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="restaurant" style="font-variation-settings: 'FILL' 1;">restaurant</span>
                        Food
                    </button>
<!-- Unselected Chips -->
<button class="flex items-center gap-1.5 px-4 py-2 rounded-full bg-[#FBF6F0] text-[#276152] border border-[#B1B7AB] hover:bg-[#B1B7AB] hover:text-[#0D3A35] font-label-bold text-label-bold transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="local_gas_station">local_gas_station</span>
                        Fuel
                    </button>
<button class="flex items-center gap-1.5 px-4 py-2 rounded-full bg-[#FBF6F0] text-[#276152] border border-[#B1B7AB] hover:bg-[#B1B7AB] hover:text-[#0D3A35] font-label-bold text-label-bold transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="person">person</span>
                        Personal
                    </button>
<button class="flex items-center gap-1.5 px-4 py-2 rounded-full bg-[#FBF6F0] text-[#276152] border border-[#B1B7AB] hover:bg-[#B1B7AB] hover:text-[#0D3A35] font-label-bold text-label-bold transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="inventory_2">inventory_2</span>
                        Inventory
                    </button>
<button class="flex items-center gap-1.5 px-4 py-2 rounded-full bg-[#FBF6F0] text-[#276152] border border-[#B1B7AB] hover:bg-[#B1B7AB] hover:text-[#0D3A35] font-label-bold text-label-bold transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="more_horiz">more_horiz</span>
                        Other
                    </button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-stack-gap-sm mt-stack-gap-sm border-t border-[#B1B7AB]">
<button class="w-full h-touch-target-min bg-[#0D3A35] text-white font-headline-md text-headline-md rounded-xl shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                    Confirm Expense
                </button>
<div class="text-center mt-3">
<button class="text-[#0D3A35] font-label-bold text-label-bold hover:underline">Edit Details</button>
</div>
</div>
</section>
</main>
</body></html>
