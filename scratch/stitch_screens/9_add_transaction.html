<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Transaction - HisaabPro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#0D3A35",
                        "secondary": "#276152",
                        "outline-variant": "#B1B7AB",
                        "background": "#FBF6F0",
                        "surface": "#FBF6F0",
                        "on-background": "#0D3A35",
                        "on-surface": "#0D3A35",
                        "surface-container-low": "#F1EDE8",
                        "surface-container": "#EAE5DF",
                        "surface-variant": "#B1B7AB",
                        "on-surface-variant": "#276152",
                        "primary-container": "#276152",
                        "on-primary": "#FBF6F0",
                        "success": "#2E7D32",
                        "error": "#C62828",
                        "warning": "#EF6C00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap-lg": "24px",
                        "stack-gap-sm": "8px",
                        "card-padding": "16px",
                        "touch-target-min": "48px",
                        "stack-gap-md": "16px",
                        "container-margin": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Noto Sans"],
                        "label-sm": ["Noto Sans"],
                        "hero-amount": ["Noto Sans"],
                        "body-lg": ["Noto Sans"],
                        "headline-md": ["Noto Sans"],
                        "body-md": ["Noto Sans"],
                        "label-bold": ["Noto Sans"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "hero-amount": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-bold": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-start pb-24 max-w-[390px] mx-auto overflow-x-hidden relative shadow-2xl">
<!-- TopAppBar -->
<header class="bg-surface shadow-sm docked full-width top-0 z-50 flex justify-between items-center px-container-margin h-touch-target-min w-full sticky top-0 border-b border-outline-variant/30">
<div class="flex items-center gap-2">
<button class="p-2 -ml-2 text-primary hover:bg-surface-container-low transition-colors rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="text-headline-md font-headline-md text-primary">New Transaction</h1>
</div>
</header>
<main class="w-full flex-1 flex flex-col px-container-margin py-stack-gap-lg gap-stack-gap-lg">
<!-- Amount Entry Section -->
<section class="w-full flex flex-col items-center bg-surface-container-low rounded-xl p-card-padding border border-outline-variant/20">
<div class="flex items-baseline justify-center w-full mb-4 border-b-2 border-outline-variant pb-2 focus-within:border-primary transition-colors">
<span class="text-headline-lg font-headline-lg text-on-surface-variant mr-1">₹</span>
<input aria-label="Amount" class="bg-transparent border-none outline-none text-hero-amount font-hero-amount text-center text-on-background w-full focus:ring-0 p-0" readonly="" type="text" value="0"/>
</div>
<!-- Custom Numpad -->
<div class="grid grid-cols-3 gap-2 w-full max-w-[280px]">
<button class="h-16 flex items-center justify-center bg-white rounded-lg border border-outline-variant shadow-sm hover:bg-surface-container transition-colors text-headline-md font-headline-md text-on-background">1</button>
<button class="h-16 flex items-center justify-center bg-white rounded-lg border border-outline-variant shadow-sm hover:bg-surface-container transition-colors text-headline-md font-headline-md text-on-background">2</button>
<button class="h-16 flex items-center justify-center bg-white rounded-lg border border-outline-variant shadow-sm hover:bg-surface-container transition-colors text-headline-md font-headline-md text-on-background">3</button>
<button class="h-16 flex items-center justify-center bg-white rounded-lg border border-outline-variant shadow-sm hover:bg-surface-container transition-colors text-headline-md font-headline-md text-on-background">4</button>
<button class="h-16 flex items-center justify-center bg-white rounded-lg border border-outline-variant shadow-sm hover:bg-surface-container transition-colors text-headline-md font-headline-md text-on-background">5</button>
<button class="h-16 flex items-center justify-center bg-white rounded-lg border border-outline-variant shadow-sm hover:bg-surface-container transition-colors text-headline-md font-headline-md text-on-background">6</button>
<button class="h-16 flex items-center justify-center bg-white rounded-lg border border-outline-variant shadow-sm hover:bg-surface-container transition-colors text-headline-md font-headline-md text-on-background">7</button>
<button class="h-16 flex items-center justify-center bg-white rounded-lg border border-outline-variant shadow-sm hover:bg-surface-container transition-colors text-headline-md font-headline-md text-on-background">8</button>
<button class="h-16 flex items-center justify-center bg-white rounded-lg border border-outline-variant shadow-sm hover:bg-surface-container transition-colors text-headline-md font-headline-md text-on-background">9</button>
<button class="h-16 flex items-center justify-center text-on-surface-variant bg-transparent rounded-lg hover:bg-surface-container transition-colors text-headline-md font-headline-md">.</button>
<button class="h-16 flex items-center justify-center bg-white rounded-lg border border-outline-variant shadow-sm hover:bg-surface-container transition-colors text-headline-md font-headline-md text-on-background">0</button>
<button class="h-16 flex items-center justify-center text-on-surface-variant bg-transparent rounded-lg hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[28px]">backspace</span>
</button>
</div>
</section>
<!-- Income/Expense Toggle -->
<div class="flex bg-surface-container rounded-full p-1 relative shadow-inner w-full border border-outline-variant/30">
<div class="absolute inset-y-1 left-1 w-[calc(50%-4px)] bg-white rounded-full shadow-sm transition-transform duration-300"></div>
<button class="flex-1 py-2 text-center text-success font-headline-md z-10 rounded-full">Income</button>
<button class="flex-1 py-2 text-center text-on-surface-variant font-headline-md z-10 rounded-full hover:text-error transition-colors">Expense</button>
</div>
<!-- Category Grid -->
<section class="w-full">
<h2 class="text-body-md font-body-md text-on-surface-variant mb-3 px-1">Category</h2>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-outline-variant hover:border-primary hover:bg-primary-container/5 transition-colors">
<span class="material-symbols-outlined text-primary mb-1">local_gas_station</span>
<span class="text-label-sm font-label-sm text-on-background">Fuel</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-outline-variant hover:border-primary hover:bg-primary-container/5 transition-colors">
<span class="material-symbols-outlined text-primary mb-1">restaurant</span>
<span class="text-label-sm font-label-sm text-on-background">Food</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-outline-variant hover:border-primary hover:bg-primary-container/5 transition-colors">
<span class="material-symbols-outlined text-primary mb-1">payments</span>
<span class="text-label-sm font-label-sm text-on-background">Salary</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-outline-variant hover:border-primary hover:bg-primary-container/5 transition-colors">
<span class="material-symbols-outlined text-primary mb-1">home_work</span>
<span class="text-label-sm font-label-sm text-on-background">Rent</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-outline-variant hover:border-primary hover:bg-primary-container/5 transition-colors">
<span class="material-symbols-outlined text-primary mb-1">inventory_2</span>
<span class="text-label-sm font-label-sm text-on-background">Stock</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl bg-white border border-outline-variant hover:border-primary hover:bg-primary-container/5 transition-colors">
<span class="material-symbols-outlined text-primary mb-1">electric_bolt</span>
<span class="text-label-sm font-label-sm text-on-background">Electricity</span>
</button>
</div>
</section>
<!-- Details & Quick Actions -->
<section class="w-full space-y-4">
<div class="flex gap-2">
<button class="flex-1 flex items-center justify-center gap-2 py-2 px-4 rounded-lg bg-white text-on-surface-variant hover:bg-surface-container transition-colors border border-outline-variant border-dashed">
<span class="material-symbols-outlined">mic</span>
<span class="text-body-md font-body-md">Voice Note</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 py-2 px-4 rounded-lg bg-white text-on-surface-variant hover:bg-surface-container transition-colors border border-outline-variant border-dashed">
<span class="material-symbols-outlined">photo_camera</span>
<span class="text-body-md font-body-md">Receipt</span>
</button>
</div>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-3 top-3 text-on-surface-variant">edit_note</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-body-lg font-body-lg text-on-background placeholder:text-outline-variant" placeholder="Add a note (optional)" type="text"/>
</div>
</section>
</main>
<!-- Bottom Action Anchor -->
<div class="fixed bottom-0 w-full max-w-[390px] p-container-margin bg-background bg-opacity-95 backdrop-blur-sm border-t border-outline-variant/30 shadow-[0_-4px_12px_rgba(13,58,53,0.08)]">
<button class="w-full bg-primary text-on-primary py-4 rounded-xl text-headline-md font-headline-md shadow-[0_4px_12px_rgba(13,58,53,0.2)] hover:bg-secondary active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            Save Transaction
        </button>
</div>
</body></html>
